name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and deploy app
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm install 20
              nvm use 20
            fi

            cd ~/forum-api-expert-be
            git pull origin main
            npm ci --no-audit --no-fund
            npm run migrate up
            if pm2 describe forum-api-expert-be > /dev/null; then
              pm2 restart forum-api-expert-be
            else
              pm2 start src/app.js --name forum-api-expert-be
            fi
            pm2 save
