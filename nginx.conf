limit_req_zone $binary_remote_addr zone=threads_limit:10m rate=90r/m;

server {
    listen 80;
    server_name dcdg.xyz; # Ganti dengan domain Anda jika ada

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dcdg.xyz; # Ganti dengan domain Anda jika ada

    ssl_certificate /etc/letsencrypt/live/dcdg.xyz/fullchain.pem; # Sesuaikan path sertifikat
    ssl_certificate_key /etc/letsencrypt/live/dcdg.xyz/privkey.pem; # Sesuaikan path key

    location /threads {
        limit_req zone=threads_limit burst=20 nodelay;
        proxy_pass http://localhost:3000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:3000; # Sesuaikan dengan port aplikasi Anda
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
