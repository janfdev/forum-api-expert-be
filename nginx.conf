limit_req_zone $binary_remote_addr zone=threads_limit:10m rate=90r/m;

server {
    listen 80;
    server_name fizaa.my.id; 

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name fizaa.my.id; 

    ssl_certificate /etc/letsencrypt/live/fizaa.my.id/fullchain.pem; 
    ssl_certificate_key /etc/letsencrypt/live/fizaa.my.id/privkey.pem; 

    location /threads {
        limit_req zone=threads_limit burst=20 nodelay;
        proxy_pass http://localhost:3000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:3000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}